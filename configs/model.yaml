# configs/model.yaml
model:
  name: "Energy_Forecast_RF_Regressor"
  model_kind: "random_forest_regressor"
  dry_run: true
  # Static parameters (Not being tuned)
  params:
    random_state: 42
    n_jobs: -1
  # Dynamic parameters (Being tuned)
  hpo:
    strategy: "grid"
    parameters:
      n_estimators: [50, 100, 200]
      max_depth: [None, 10, 20]
      min_samples_split: [2, 5]

# TRAINING HYPERPARAMETERS
# (Stays as a separate root-level block as per your AppConfig)
training:
  learning_rate: 0.001
  batch_size: 32
  epochs: 100

model_search:
  strategy: "grid"
  scoring: "rmse"
  max_trials: 20
  models:
    - name: "rf_small"
      model_kind: "random_forest_regressor"
      params:
        n_estimators: 100
        max_depth: 10

    - name: "rf_large"
      model_kind: "random_forest_regressor"
      params:
        n_estimators: 500
        max_depth: 20