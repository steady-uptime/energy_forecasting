# configs/model.yaml
# MODEL ENGINEERING LAYER
# ---------------------------------------------------------
# Notice the 'model:' header. This is the Namespace.
model:
  name: "Energy_Forecast_RF_Regressor"
  model_type: "random_forest_regressor"
  params:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    n_jobs: -1

# TRAINING HYPERPARAMETERS
# ---------------------------------------------------------
# Note: If your AppConfig dataclass doesn't have a 'training' 
# attribute inside ModelConfig, keep this outside the 'model' block.
# However, looking at your AppConfig, you have a separate TrainingConfig.
training:
  learning_rate: 0.001
  batch_size: 32
  epochs: 100
