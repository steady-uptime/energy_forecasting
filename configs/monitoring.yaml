# configs/monitoring.yaml
monitoring:
  # Keep the operational logic here
  primary_metric: "rmse"
  drift_threshold: 0.10     # 10% relative increase allowed

  # Thresholds for live production drift
  # (Distinct from EvaluationConfig which handles training validation)
  thresholds:
    rmse_ratio: 1.10
    mse_ratio: 1.10

  reporting:
    # Remove hardcoded paths; these should be derived from ArtifactConfig
    # or injected via the orchestrator.
    drift_report_format: "json"
